<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AiLink.Dog · 主页设计</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: "Plus Jakarta Sans", "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif; letter-spacing: -0.025em; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variations/V1_TechMinimal.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="v1"
          title="V1 · 技术极简"
          subtitle="你选定的方向。增加了呼吸感 (更大留白、节奏更舒展) 和交互 (tab 切换代码、点击模型查看延迟分布、滚动数字递增、实时 ticker、FAQ 折叠)。"
        >
          <DCArtboard id="v1-light" label="V1 · Light · 浅色模式 (默认)" width={1440} height={3100}>
            <V1TechMinimal/>
          </DCArtboard>
          <DCArtboard id="v1-dark" label="V1 · Dark · 全页面深色模式" width={1440} height={3100}>
            <V1TechMinimalDark/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
